# ============================================================
#  Application
# ============================================================
spring.application.name=realestate-api
server.port=8080

# ============================================================
#  Swagger / OpenAPI (springdoc)
#  Once running:
#    Swagger UI  ->  http://localhost:8080/swagger-ui.html
#    OpenAPI JSON ->  http://localhost:8080/v3/api-docs
# ============================================================
springdoc.swagger-ui.path=/swagger-ui.html

# ============================================================
#  TEMPORARY  --  Milestone 0 only  (DELETE in the next step)
#  JPA + the Postgres driver are on the classpath, so with NO
#  database configured the app would refuse to start. The line
#  below tells Spring to skip database auto-configuration so the
#  skeleton boots with no DB yet. We will REMOVE this line when
#  we connect Neon, and uncomment the datasource block below.
# ============================================================
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# ============================================================
#  Neon Postgres  --  fill these in the NEXT step, then delete
#  the "spring.autoconfigure.exclude" line above.
# ============================================================
# spring.datasource.url=jdbc:postgresql://<host>/<database>?sslmode=require
# spring.datasource.username=<username>
# spring.datasource.password=<password>
# spring.jpa.hibernate.ddl-auto=update
# spring.jpa.show-sql=true
